app: vjepa_wm
nodes: 1
tasks_per_node: 1
cpus_per_task: 8
folder: ${JEPAWM_LOGS}/pt_sweep/pt_4f_fsk5_ask1_r224_flextok_d18d28dfn_k64_predAdaLN_depth6_2roll_save
data:
  dataset_type: custom
  datasets:
    - PushT
  datasets_weights: null
  seed: 234
  img_size: 224
  validation:
    val_datasets: []
    val_datasets_1: null
    num_frames_val: 8
    val_dataset_batch_size: 4
    val_dataset_drop_last: false
    val_dataset_fpcs: [8]
    val_dataset_camera_views: null
    val_viz_rank0_loader: false
  loader:
    batch_size: 4
    num_workers: 4
    pin_mem: true
    persistent_workers: true
  custom:
    split_ratio: 0.9
    frameskip: 5
    action_skip: 1
    state_skip: 1
    normalize_action: true
    traj_subset: true
    filter_first_episodes: null
    filter_tasks: null
    num_hist: 3
    num_pred: 1
    with_reward: false
    custom_teleop_dset: null
  droid:
    camera_frame: false
    camera_views:
      - 2
    droid_to_rcasa_action_format: 1
    rcasa_to_droid_action_format: false
    fps: 4
    dataset_fpcs: [8]
    mpk_manifest_patterns: []
data_aug:
  auto_augment: false
  random_horizontal_flip: false
  motion_shift: false
  random_resize_aspect_ratio:
  - 1.
  - 1.
  random_resize_scale:
  - 1.777
  - 1.777
  reprob: 0.0
  # FlexTok's SD-VAE expects images in [-1, 1].
  # normalize with mean=0.5, std=0.5 maps [0,1] -> [-1,1].
  normalize: [[0.5, 0.5, 0.5], [0.5, 0.5, 0.5]]
logging:
  write_tag: jepa
  wandb:
    use_wandb: true
    debug: false
    project: vjepa_wm
    disable_wandb_media: true
    log_media_locally: true
loss:
  cos_loss_weight: 0.0
  l1_loss_weight: 0.0
  l2_loss_weight: 1.0
  smooth_l1_loss_weight: 0.0
meta:
  plan_only_eval_mode: false
  light_eval_only_mode: false
  quick_debug: false
  freeze_encoder: true
  load_checkpoint: true
  load_opt_scale_epoch: true
  read_checkpoint: null
  pretrained_path:
  seed: 234
  eval_freq: 1
  light_eval_freq: 300
  save_every_freq: 1
  dtype: bfloat16
  data_traj_rollout_eval:
    do_data_traj_rollout_eval: true
    data_traj_eval_rollout_steps: 6
    data_traj_decode_gt: true
    data_traj_eval_ctxt_window: 3
  energy_landscape_eval:
    do_energy_landscape_eval: false
    energy_landscape_rollout_steps: 1
    energy_landscape_ctxt_window: 3
model:
  # grid_size = sqrt(eval_keep_k) = sqrt(64) = 8
  # patch_size (virtual) = img_size / grid_size = 224 / 8 = 28
  grid_size: 8
  tubelet_size_enc: 1
  use_activation_checkpointing: false
  action_conditioning: token
  proprio_encoding: feature
  num_frames_pred: 4
  # Visual encoder config — FlexTok EPFL-VILAB/flextok_d18_d28_dfn
  visual_encoder:
    enc_type: flextok
    enc_version: EPFL-VILAB/flextok_d18_d28_dfn
    # eval_keep_k tokens truncated from 256 (Matryoshka ordering).
    # Must be a perfect square: 64 = 8x8 grid.
    eval_keep_k: 64
    # Native pre-projection dim of the d18 FlexTransformer encoder.
    embed_dim: 1152
    # Fields below are unused for flextok but kept for interface parity
    pretrain_enc_path: null
    pretrain_enc_ckpt_key: null
    enc_use_rope: null
    enc_name: null
    use_sdpa_enc: null
    num_frames_enc: null
  # Action encoder config
  action_encoder:
    action_tokens: 1
    action_emb_dim: 0
    act_mlp: false
    action_encoder_inpred: true
  # Proprio encoder config
  proprio_encoder:
    proprio_tokens: 0
    proprio_emb_dim: 16
    prop_mlp: false
    proprio_encoder_inpred: false
  # Predictor config — AdaLN with 6-layer predictor, internal dim 384
  # predictor_embed maps 1152 (FlexTok) -> 384 internally -> 1152 for loss targets
  predictor:
    tubelet_size: 1
    pred_num_heads: 16
    pred_depth: 6
    pred_embed_dim: 384
    pred_use_extrinsics: false
    pred_type: AdaLN
    act_pred_projector: false
    uniform_power: true
    use_SiLU: false
    use_rope: true
  wm_encoding:
    batchify_video: true
    dup_image: false
    # FlexTok features have per-token norm ~15k (vs DINOv2 ~19), which makes
    # L2 loss gradients enormous and Adam's second_moment saturate (eff. lr
    # collapses to ~1e-6). LayerNorm at the encoder output puts features on
    # unit scale so the predictor trains in a well-conditioned regime.
    normalize_reps: true
  # Rollout config — 2 sequential rollout steps during training
  rollout_cfg:
    rollout_steps: 2
    train_rollout_prefixes: random
    rollout_stop_gradient: true
    ctxt_window_train_rollout: 3
    do_parallel_rollout: false
    do_sequential_rollout: true
    prepend_gt: false
    sampling_scheduler:
      type: linear
      start: 0.
      end: 0.
  # Attention config
  attn:
    local_window_time: 3
    local_window_h: -1
    local_window_w: -1
  heads_cfg:
    architectures: {}
    pretrain_dec_path:
optimization:
  main_optimizer: transition_model
  train_heads: false
  transition_model:
    # Auto-derive (null) gives 495k iters/epoch — far too long. Cap at 1000
    # so each epoch is ~20 min on RTX 4000 Ada and checkpoints save regularly.
    # Loss has been verified to converge in well under 1 epoch of this size,
    # so 50 epochs is generous for full convergence + safety margin.
    iterations_per_epoch: 1000
    ipe_scale: 1.
    clip_grad: 1
    use_radamw: false
    betas: [0.9, 0.999]
    eps: 1.e-8
    weight_decay: 1.e-7
    final_weight_decay: 1.e-6
    num_epochs: 50
    warmup: 0
    start_lr: 5.e-4
    ref_lr: 5.e-4
    final_lr: 5.e-4
    mixed_precision: true
evals:
  decode: false
  eval_episodes: 96
  nodes: 1
  low_pri: true
  obs: rgb_state
  alpha: 0.1
  dump_eval_configs: false
  eval_cfg_paths:
    - configs/online_plan_evals/pt/flextok/pt_L2_cem_sourcedset_H6_nas6_ctxt2_flextok_k64.yaml
