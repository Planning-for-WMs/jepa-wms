folder: ${JEPAWM_LOGS}/l2/pt_l2
checkpoint_folder: ${JEPAWM_CKPT}/l2/pt_l2
seed: 234
quick_debug: false

# ─── Precomputed feature cache ─────────────────────────────────────────────
precompute:
  cache_path: ${JEPAWM_CKPT}/l2/pt_l2/dino_features.h5
  encode_batch_size: 2048
  loader_workers: 8
  keys_to_cache:
    - features
    - actions
    - proprios

# ─── L2 specific ────────────────────────────────────────────────────────────
l2:
  latent_action_dim: 8
  max_chunk_size: 70
  num_waypoints: 5
  segment_length_range: [25, 70]
  ctxt_window: 2

  # L2 predictor (scaled-up AdaLN ViT — same class as L1)
  predictor:
    pred_depth: 10
    pred_embed_dim: 768
    pred_num_heads: 12
    use_rope: true
    use_proprio: true
    proprio_encoding: token
    proprio_tokens: 1
    proprio_emb_dim: 0
    local_window: [3, -1, -1]

  # Latent action encoder (transformer)
  action_encoder:
    encoder_depth: 2
    encoder_heads: 4
    encoder_dim: 128

# ─── L1 model config (needed to reconstruct frozen encoder) ─────────────────
model:
  grid_size: 16
  visual_encoder:
    enc_type: dino
    enc_version: dinov2_vits14
    feature_key: x_norm_patchtokens
    pretrain_enc_path: null
    pretrain_enc_ckpt_key: target_encoder
    embed_dim: 384
  wm_encoding:
    normalize_reps: false

# ─── Data ────────────────────────────────────────────────────────────────────
data:
  dataset_type: custom
  datasets:
    - PushT
  datasets_weights: null
  seed: 234
  img_size: 224
  validation:
    val_datasets: []
    val_datasets_1: null
    num_frames_val: null
    val_dataset_batch_size: 4
    val_dataset_drop_last: false
    val_dataset_fpcs: [8]
    val_dataset_camera_views: null
    val_viz_rank0_loader: false
  loader:
    batch_size: 64
    num_workers: 8
    pin_mem: true
    persistent_workers: true
  custom:
    split_ratio: 0.9
    frameskip: 1
    action_skip: 1
    state_skip: 1
    normalize_action: true
    traj_subset: true
    filter_first_episodes: null
    filter_tasks: null
    num_hist: 68
    num_pred: 1
    with_reward: false
    custom_teleop_dset: null
  droid:
    camera_frame: false
    camera_views:
      - 2
    droid_to_rcasa_action_format: 1
    rcasa_to_droid_action_format: false
    fps: 4
    dataset_fpcs: [8]
    mpk_manifest_patterns: []

data_aug:
  auto_augment: false
  random_horizontal_flip: false
  motion_shift: false
  random_resize_aspect_ratio:
    - 1.
    - 1.
  random_resize_scale:
    - 1.777
    - 1.777
  reprob: 0.0
  normalize: [[0.485, 0.456, 0.406], [0.229, 0.224, 0.225]]

# ─── Optimization ───────────────────────────────────────────────────────────
optimization:
  num_epochs: 500
  lr: 3.e-4
  batch_size: 64
  gradient_accumulation_steps: 4
  weight_decay: 1.e-5
  clip_grad: 1.0
  betas: [0.9, 0.999]
  save_every: 50
  log_freq: 10

# ─── Logging ─────────────────────────────────────────────────────────────────
logging:
  wandb:
    use_wandb: true
    project: vjepa_wm_l2
